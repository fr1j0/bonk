name: Feature request
description: Suggest a new capability or change to bonk.
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        bonk has a deliberately tight scope: stop a wrong path, audit the
        assumptions, and (when context is too far gone) restart from a clean,
        verified brief. Broader "agent supervision," task tracking, or automatic
        interruption are out of scope unless there's a strong case. Please confirm
        fit before filing — see [CONTRIBUTING](https://github.com/fr1j0/bonk/blob/main/CONTRIBUTING.md#why-issue-first).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's painful?
      placeholder: "When I bonk twice in a row, the second clean brief silently overwrites the first..."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Roughly how would bonk address this?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, including doing nothing.
    validations:
      required: false

  - type: checkboxes
    id: scope_check
    attributes:
      label: Scope check
      options:
        - label: I've read "Why issue-first?" in CONTRIBUTING and believe this fits bonk's scope (pattern-interrupt + context re-grounding).
          required: true
